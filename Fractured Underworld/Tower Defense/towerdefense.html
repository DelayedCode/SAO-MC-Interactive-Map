<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractured Underworld - Tower Defense</title>
  <link rel="stylesheet" href="towerdefense.css">
</head>
<body>
  <header>
    <div class="header-main">
      <h1>Fractured Underworld Tower Defense</h1>
      <a class="header-back-button" href="../Main UI/mainui.html">Go back</a>
    </div>
  </header>

  <main>
    <section class="layout-grid" aria-label="Tower Defense sections">
      <div class="layout-left">
        <section class="intro-card chapter-card" aria-label="Tower Defense chapter overview">
          <h2>Chapter Select</h2>
          <div class="shop-list chapter-list" aria-label="Tower Defense chapter list">
            <button class="chapter-button" type="button" data-open-info-sheet="true" data-chapter="1" aria-haspopup="dialog" aria-controls="towerDefenseInfoSheet">Chapter 1</button>
            <button class="chapter-button" type="button" data-open-info-sheet="true" data-chapter="2" aria-haspopup="dialog" aria-controls="towerDefenseInfoSheet">Chapter 2</button>
            <button class="chapter-button" type="button" data-open-info-sheet="true" data-chapter="3" aria-haspopup="dialog" aria-controls="towerDefenseInfoSheet">Chapter 3</button>
            <button class="chapter-button" type="button" data-open-info-sheet="true" data-chapter="4" aria-haspopup="dialog" aria-controls="towerDefenseInfoSheet">Chapter 4</button>
            <button class="chapter-button" type="button" data-open-info-sheet="true" data-chapter="5" aria-haspopup="dialog" aria-controls="towerDefenseInfoSheet">Chapter 5</button>
            <button class="chapter-button" type="button" data-open-info-sheet="true" data-chapter="6" aria-haspopup="dialog" aria-controls="towerDefenseInfoSheet">Chapter 6</button>
          </div>
        </section>
      </div>

      <aside class="layout-right" aria-label="Tower Defense shop section">
        <section class="intro-card shop-card">
          <h2>Tower Defense Shop</h2>
          <div id="towerDefenseShopList" class="shop-list" aria-label="Tower Defense shop list"></div>
        </section>
      </aside>
    </section>
  </main>

  <div id="towerDefenseInfoSheet" class="info-sheet" aria-hidden="true">
    <div class="info-sheet-backdrop" data-close-info-sheet="true"></div>
    <section class="info-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="infoSheetTitle">
      <header class="info-sheet-header">
        <h2 id="infoSheetTitle">Tower Defense Info Sheet</h2>
        <button id="closeInfoSheetButton" class="close-button" type="button" aria-label="Close info sheet">Close</button>
      </header>

      <div id="towerDefenseInfoSheetContent" class="info-sheet-content"></div>
    </section>
  </div>

  <div id="towerDefenseToast" class="global-toast" aria-hidden="true"></div>

  <script src="towerdefense.js"></script>
</body>
</html>

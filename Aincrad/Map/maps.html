<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SAO Interactive Map</title>
  <link rel="stylesheet" href="maps.css">
</head>
<body>
  <header>
    <div class="top-nav">
      <button class="top-button" type="button" data-nav-target="patchnotes">Patch Notes</button>
      <button class="top-button" type="button" data-nav-target="bestiary">Bestiary</button>
      <button class="top-button" type="button" data-nav-target="equipment">Equipment Compendium</button>
      <button class="top-button" type="button" data-nav-target="quests">Quests</button>
      <button class="top-button" type="button" data-nav-target="commands">Commands</button>
      <button class="top-button" type="button" data-nav-target="miscinfo">Misc. Info</button>
      <button class="top-button" type="button" data-nav-target="menu">Go back to Menu</button>
    </div>
    <div class="header-main">
      <h1>SAO Interactive Map</h1>
      <div class="controls">
        <label for="floorSelect">Floor:</label>
        <select id="floorSelect">
          <option value="floor1">Floor 1 - The Town of Beginnings</option>
          <option value="floor2">Floor 2 - Arid Desert</option>
          <option value="floor3">Floor 3 - The Forest of Wandering</option>
        </select>
        <label class="underground-toggle-wrapper" for="undergroundToggle">
          <span>Underground:</span>
          <input type="checkbox" id="undergroundToggle">
        </label>
        <input type="text" id="search" placeholder="Search markers...">
      </div>
    </div>
  </header>

  <main>
    <section id="mapContainer">
      <div id="mapLayer">
        <img id="mapImage" alt="Map floor">
        <img id="undergroundMapImage" class="underground-map" alt="Underground overlay">
        <svg id="mobAreaLayer" aria-hidden="true"></svg>
        <div id="markers"></div>
      </div>
      <div id="coordinateDisplay">
        <div id="overlayMappedCoords">X: -- Z: --</div>
      </div>
      <div id="zoomControls">
        <button id="resetView" type="button">Reset View</button>
        <span id="zoomLabel">1x</span>
      </div>
      <div id="infoOverlay">
        <div class="sidebar-section">
          <div class="sidebar-section-title" id="title">Select a marker</div>
          <div id="content">
            <p>Choose a marker on the map to see details here.</p>
          </div>
        </div>
      </div>
    </section>

    <div id="sidebarResizeHandle" role="separator" aria-label="Resize sidebar" aria-orientation="vertical"></div>

    <aside id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Category: Main</div>
        <ul class="sidebar-list">
          <li><button class="sidebar-list-button" type="button" data-category="biomes">Biomes</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="bossSpawns">Boss Spawns</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="dungeons">Dungeons</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="farmingSpots">Farming Spots</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="mobAreas">Mob Areas</button></li>
        </ul>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Category: Quests</div>
        <ul class="sidebar-list">
          <li>Main Quests</li>
          <li><button class="sidebar-list-button" type="button" data-category="sideQuests">Side Quests</button></li>
        </ul>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Category: Journeymen</div>
        <ul class="sidebar-list">
          <li><button class="sidebar-list-button" type="button" data-category="alchemist">Alchemist</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="lumberjack">Lumberjack</button></li>
        </ul>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Category: Market</div>
        <ul class="sidebar-list">
          <li><button class="sidebar-list-button" type="button" data-category="accessoriesMerchants">Accessories Merchant</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="consumablesMerchants">Consumables Merchant</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="equipmentMerchants">Equipment Merchant</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="lootBuyers">Loot Buyers</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="occultMerchants">Occult Merchant</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="toolMerchants">Tool Merchant</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="travelingMerchants">Traveling Merchants</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="weaponSellers">Weapon Sellers</button></li>
        </ul>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Category: Craftsmen</div>
        <ul class="sidebar-list">
          <li><button class="sidebar-list-button" type="button" data-category="accessoriesBlacksmith">Accessories Blacksmith</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="armorBlacksmith">Armor Blacksmith</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="ingotBlacksmith">Ingot Blacksmith</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="keyBlacksmith">Key Blacksmith</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="refaire">Refaire</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="runeCraftsmen">Rune Craftsmen</button></li>
          <li><button class="sidebar-list-button" type="button" data-category="weaponsmith">Weaponsmith</button></li>
        </ul>
      </div>
    </aside>
  </main>

  <script src="mapData.js"></script>
  <script src="maps_floor1.js"></script>
  <script src="maps_floor2.js"></script>
  <script src="maps_floor3.js"></script>
  <script src="../../shared/sao-storage.js"></script>
  <script src="maps.js"></script>
</body>
</html>

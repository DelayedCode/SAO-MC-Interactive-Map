<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAO Commands</title>
  <link rel="stylesheet" href="commands.css">
</head>
<body>
  <div class="page">
    <div class="nav">
      <button type="button" data-nav-target="maps">Maps</button>
      <button type="button" data-nav-target="bestiary">Bestiary</button>
      <button type="button" data-nav-target="equipment">Equipment</button>
      <button type="button" data-nav-target="quests">Quests</button>
      <button type="button" data-nav-target="patchnotes">Patchnotes</button>
      <button type="button" data-nav-target="commands">Commands</button>
    </div>

    <div class="panel">
      <h1>Commands</h1>

      <div id="categoryFilters" class="list-tabs" role="tablist" aria-label="Command categories"></div>

      <div class="panel-header">
        <p id="status">Loading...</p>
        <label class="search-label" for="commandSearch">
          <span>Search commands</span>
          <input id="commandSearch" type="search" placeholder="Search by command, usage, or example..." autocomplete="off">
        </label>
      </div>

      <div id="commandTableRoot"></div>
    </div>
  </div>

  <script src="../../shared/sao-storage.js"></script>
  <script src="commands.js"></script>
</body>
</html>

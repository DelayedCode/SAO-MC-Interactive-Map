<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAO MC - Module Hub</title>
  <style>
    :root {
      --bg-1: #0f141c;
      --bg-2: #1a2230;
      --panel: rgba(17, 23, 34, 0.8);
      --line: rgba(165, 201, 255, 0.28);
      --text: #edf5ff;
      --muted: #9bb0c9;
      --accent-a: #7ac7ff;
      --accent-b: #98e0a8;
      --accent-c: #ffb46e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at 10% -10%, #243549 0%, transparent 55%),
        radial-gradient(900px 600px at 100% 0%, #1f3848 0%, transparent 50%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(920px, 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      padding: 26px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      letter-spacing: 0.03em;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }

    .mode-button {
      appearance: none;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(13, 20, 30, 0.72);
      color: var(--text);
      text-align: left;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }

    .mode-button:hover {
      transform: translateY(-2px);
      border-color: var(--accent-a);
      background: rgba(18, 30, 45, 0.86);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.26);
    }

    .mode-button.aincrad:hover { border-color: var(--accent-a); }
    .mode-button.underworld:hover { border-color: var(--accent-b); }
    .mode-button.ggo:hover { border-color: var(--accent-c); }

    .card-title {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 700;
    }

    .card-desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.3;
    }

    .toast {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(33, 22, 14, 0.94);
      color: #ffe7cf;
      border: 1px solid rgba(255, 180, 110, 0.6);
      border-radius: 10px;
      padding: 12px 14px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Select SAO MC Gamemode</h1>
    <p>Choose which gamemode info you want to view.</p>

    <section class="grid" aria-label="Gamemode selector">
      <button class="mode-button aincrad" type="button" onclick="window.location.href='Aincrad/Map/maps.html'">
        <h2 class="card-title">Aincrad</h2>
        <div class="card-desc">Aincrad - Open the Map menu and access Beastiary, Equipment, Quests, and more from there.</div>
      </button>

      <button class="mode-button underworld" type="button" id="underworld-btn">
        <h2 class="card-title">Fractured Underworld</h2>
        <div class="card-desc">Show release status message until this section is published.</div>
      </button>

      <button class="mode-button ggo" type="button" id="ggo-btn">
        <h2 class="card-title">GunGaleOnline (GGO)</h2>
        <div class="card-desc">Show release status message.</div>
      </button>
    </section>
  </main>

  <div id="status-toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      const ggoBtn = document.getElementById("ggo-btn");
      const underworldBtn = document.getElementById("underworld-btn");
      const toast = document.getElementById("status-toast");
      let timerId = null;

      if (!toast) return;

      const showToast = (message) => {
        toast.textContent = message;
        toast.classList.add("show");

        if (timerId) {
          clearTimeout(timerId);
        }

        timerId = setTimeout(() => {
          toast.classList.remove("show");
          timerId = null;
        }, 2500);
      };

      if (underworldBtn) {
        underworldBtn.addEventListener("click", () => {
          showToast("Fractured Underworld is not published yet.");
        });
      }

      if (ggoBtn) {
        ggoBtn.addEventListener("click", () => {
          showToast("GGO is not out yet! No info to display.");
        });
      }
    })();
  </script>
</body>
</html>
